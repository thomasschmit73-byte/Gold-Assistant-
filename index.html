<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldAndPoker — Asystent Tradingu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
–gold: #FFD700;
–gold2: #FFA500;
–dark: #0a0a0f;
–dark2: #111118;
–dark3: #1a1a24;
–green: #00ff88;
–red: #ff3366;
–blue: #00aaff;
–text: #e0e0e0;
–muted: #666680;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–dark);
color: var(–text);
font-family: ‘Share Tech Mono’, monospace;
min-height: 100vh;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto;
padding: 16px;
}

.header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 20px;
padding-bottom: 16px;
border-bottom: 1px solid rgba(255,215,0,0.2);
}

.logo {
font-family: ‘Orbitron’, monospace;
font-size: 1.4rem;
font-weight: 900;
color: var(–gold);
text-shadow: 0 0 20px rgba(255,215,0,0.4);
letter-spacing: 2px;
}

.logo span { color: var(–text); }

.live-badge {
display: flex;
align-items: center;
gap: 8px;
background: rgba(255,51,102,0.15);
border: 1px solid rgba(255,51,102,0.4);
padding: 6px 14px;
border-radius: 4px;
font-size: 0.75rem;
color: var(–red);
letter-spacing: 2px;
}

.live-dot {
width: 8px; height: 8px;
background: var(–red);
border-radius: 50%;
animation: pulse 1.5s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.8); }
}

.price-section {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.15);
border-radius: 8px;
padding: 20px;
margin-bottom: 16px;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
}

.price-label {
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 3px;
margin-bottom: 4px;
}

.price-value {
font-family: ‘Orbitron’, monospace;
font-size: 2.4rem;
font-weight: 700;
color: var(–gold);
text-shadow: 0 0 30px rgba(255,215,0,0.3);
letter-spacing: 2px;
}

.price-change {
font-size: 1rem;
font-weight: 700;
padding: 4px 12px;
border-radius: 4px;
}

.price-change.up { color: var(–green); background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }
.price-change.down { color: var(–red); background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3); }

.update-info { font-size: 0.7rem; color: var(–muted); text-align: right; }
.next-update { color: var(–gold); font-size: 0.9rem; }

.trend-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 16px;
}

@media (max-width: 600px) {
.trend-grid { grid-template-columns: repeat(2, 1fr); }
.price-value { font-size: 1.8rem; }
}

.trend-card {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.1);
border-radius: 8px;
padding: 14px;
text-align: center;
transition: border-color 0.3s;
}

.trend-card.bullish { border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.05); }
.trend-card.bearish { border-color: rgba(255,51,102,0.4); background: rgba(255,51,102,0.05); }
.trend-card.neutral { border-color: rgba(255,165,0,0.4); background: rgba(255,165,0,0.05); }

.tf-label { font-size: 0.65rem; color: var(–muted); letter-spacing: 3px; margin-bottom: 8px; }
.tf-trend { font-family: ‘Orbitron’, monospace; font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
.tf-trend.up { color: var(–green); }
.tf-trend.down { color: var(–red); }
.tf-trend.sideways { color: var(–gold2); }
.tf-arrow { font-size: 1.4rem; }

.analysis-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 16px;
}

@media (max-width: 600px) { .analysis-grid { grid-template-columns: 1fr; } }

.analysis-card {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.1);
border-radius: 8px;
padding: 16px;
}

.card-title {
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 3px;
margin-bottom: 12px;
padding-bottom: 8px;
border-bottom: 1px solid rgba(255,215,0,0.1);
}

.level-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 0;
border-bottom: 1px solid rgba(255,255,255,0.04);
font-size: 0.82rem;
}

.level-row:last-child { border-bottom: none; }
.level-label { color: var(–muted); font-size: 0.72rem; }
.level-value { font-family: ‘Orbitron’, monospace; font-size: 0.85rem; font-weight: 700; }
.level-value.resistance { color: var(–red); }
.level-value.support { color: var(–green); }
.level-value.current { color: var(–gold); }

.setup-box {
background: var(–dark2);
border-radius: 8px;
padding: 20px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}

.setup-box::before { content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.setup-box.long::before { background: linear-gradient(90deg, var(–green), transparent); border: 1px solid rgba(0,255,136,0.3); }
.setup-box.short::before { background: linear-gradient(90deg, var(–red), transparent); }
.setup-box.wait::before { background: linear-gradient(90deg, var(–gold), transparent); }
.setup-box.long { border: 1px solid rgba(0,255,136,0.25); }
.setup-box.short { border: 1px solid rgba(255,51,102,0.25); }
.setup-box.wait { border: 1px solid rgba(255,215,0,0.25); }

.setup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

.setup-type { font-family: ‘Orbitron’, monospace; font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; }
.setup-type.long { color: var(–green); text-shadow: 0 0 20px rgba(0,255,136,0.4); }
.setup-type.short { color: var(–red); text-shadow: 0 0 20px rgba(255,51,102,0.4); }
.setup-type.wait { color: var(–gold); text-shadow: 0 0 20px rgba(255,215,0,0.4); }

.confidence-badge { font-size: 0.7rem; letter-spacing: 2px; padding: 4px 10px; border-radius: 4px; }
.confidence-badge.high { background: rgba(0,255,136,0.15); color: var(–green); border: 1px solid rgba(0,255,136,0.3); }
.confidence-badge.medium { background: rgba(255,215,0,0.15); color: var(–gold); border: 1px solid rgba(255,215,0,0.3); }
.confidence-badge.low { background: rgba(255,51,102,0.15); color: var(–red); border: 1px solid rgba(255,51,102,0.3); }

.setup-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

.setup-level { background: var(–dark3); border-radius: 6px; padding: 10px; text-align: center; }
.sl-label { font-size: 0.6rem; color: var(–muted); letter-spacing: 2px; margin-bottom: 6px; }
.sl-value { font-family: ‘Orbitron’, monospace; font-size: 0.9rem; font-weight: 700; }
.sl-value.entry { color: var(–blue); }
.sl-value.sl { color: var(–red); }
.sl-value.tp { color: var(–green); }

.signal-desc {
background: var(–dark3);
border-radius: 6px;
padding: 12px;
margin-top: 12px;
font-size: 0.78rem;
color: var(–text);
line-height: 1.6;
border-left: 3px solid var(–gold);
}

.rr-bar { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.rr-label { font-size: 0.7rem; color: var(–muted); letter-spacing: 2px; }
.rr-value { font-family: ‘Orbitron’, monospace; font-size: 1rem; font-weight: 700; color: var(–gold); }
.rr-bar-fill { flex: 1; height: 4px; background: var(–dark3); border-radius: 2px; overflow: hidden; }
.rr-fill { height: 100%; background: linear-gradient(90deg, var(–gold), var(–green)); border-radius: 2px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(–dark2); border: 1px solid rgba(255,215,0,0.1); border-radius: 8px; padding: 12px; text-align: center; }
.stat-label { font-size: 0.62rem; color: var(–muted); letter-spacing: 2px; margin-bottom: 6px; }
.stat-value { font-family: ‘Orbitron’, monospace; font-size: 1rem; font-weight: 700; color: var(–gold); }

.refresh-btn {
width: 100%;
background: rgba(255,215,0,0.1);
border: 1px solid rgba(255,215,0,0.3);
color: var(–gold);
font-family: ‘Orbitron’, monospace;
font-size: 0.8rem;
letter-spacing: 3px;
padding: 14px;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s;
margin-bottom: 16px;
}

.refresh-btn:hover { background: rgba(255,215,0,0.2); box-shadow: 0 0 20px rgba(255,215,0,0.2); }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.loading { text-align: center; padding: 40px; color: var(–gold); font-family: ‘Orbitron’, monospace; font-size: 0.9rem; letter-spacing: 3px; }
.spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(255,215,0,0.2); border-top-color: var(–gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer { text-align: center; font-size: 0.65rem; color: var(–muted); padding-top: 16px; border-top: 1px solid rgba(255,215,0,0.1); }
.footer span { color: var(–gold); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease forwards; }

.error-box { background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3); border-radius: 8px; padding: 20px; text-align: center; color: var(–red); font-size: 0.85rem; margin-bottom: 16px; }
</style>

</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">GOLD<span>&</span>POKER</div>
    <div class="live-badge"><div class="live-dot"></div>ANALIZA LIVE</div>
  </div>
  <div id="app"><div class="loading"><div class="spinner"></div><div>ŁADOWANIE DANYCH...</div></div></div>
  <button class="refresh-btn" id="refreshBtn" onclick="runAnalysis()">⟳ ODŚWIEŻ ANALIZĘ</button>
  <div class="footer">Auto-odświeżanie co <span>15 minut</span> • <span>GoldAndPoker</span> by Tomasz • Nie jest to doradztwo finansowe</div>
</div>

<script>
  let nextRefreshIn = 900;
  let countdownTimer;

  async function fetchGoldData() {
    // Fetch real gold price from public API (no key needed)
    const res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=5m&range=1d', {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error('Błąd pobierania danych Yahoo Finance');
    const json = await res.json();
    const result = json.chart.result[0];
    const meta = result.meta;
    const closes = result.indicators.quote[0].close.filter(Boolean);
    const price = meta.regularMarketPrice || closes[closes.length - 1];
    const prevClose = meta.chartPreviousClose || meta.previousClose;
    const change = price - prevClose;
    const changePct = (change / prevClose) * 100;
    const high = meta.regularMarketDayHigh || Math.max(...closes);
    const low = meta.regularMarketDayLow || Math.min(...closes);

    // Simple trend analysis from recent closes
    const recent5 = closes.slice(-6);
    const trend5m = recent5[recent5.length-1] > recent5[0] ? 'UP' : 'DOWN';
    const recent15 = closes.slice(-18);
    const trend15m = recent15[recent15.length-1] > recent15[0] ? 'UP' : 'DOWN';
    const recent60 = closes.slice(-72);
    const trend1h = recent60.length > 1 ? (recent60[recent60.length-1] > recent60[0] ? 'UP' : 'DOWN') : trend15m;
    const trend4h = change >= 0 ? 'UP' : 'DOWN';

    // Support/Resistance from day range
    const range = high - low;
    const r1 = parseFloat((price + range * 0.3).toFixed(2));
    const r2 = parseFloat((price + range * 0.6).toFixed(2));
    const s1 = parseFloat((price - range * 0.3).toFixed(2));
    const s2 = parseFloat((price - range * 0.6).toFixed(2));

    // Setup logic
    let setup = 'CZEKAJ';
    let confidence = 'MEDIUM';
    let signal = '';
    let entryZone = '';
    let stopLoss = 0;
    let takeProfit = 0;

    const bullishTrends = [trend4h, trend1h, trend15m, trend5m].filter(t => t === 'UP').length;
    const bearishTrends = [trend4h, trend1h, trend15m, trend5m].filter(t => t === 'DOWN').length;

    if (bullishTrends >= 3) {
      setup = 'LONG';
      confidence = bullishTrends === 4 ? 'HIGH' : 'MEDIUM';
      entryZone = `${s1.toFixed(0)}-${price.toFixed(0)}`;
      stopLoss = parseFloat((s1 - range * 0.2).toFixed(2));
      takeProfit = parseFloat((r2).toFixed(2));
      signal = `Trend wzrostowy dominuje na ${bullishTrends} z 4 timeframe'ów. Szukaj wejścia LONG przy pullbacku do strefy ${s1.toFixed(0)}-${price.toFixed(0)}. Stop poniżej ${stopLoss.toFixed(0)}, cel ${takeProfit.toFixed(0)}.`;
    } else if (bearishTrends >= 3) {
      setup = 'SHORT';
      confidence = bearishTrends === 4 ? 'HIGH' : 'MEDIUM';
      entryZone = `${price.toFixed(0)}-${r1.toFixed(0)}`;
      stopLoss = parseFloat((r1 + range * 0.2).toFixed(2));
      takeProfit = parseFloat((s2).toFixed(2));
      signal = `Trend spadkowy dominuje na ${bearishTrends} z 4 timeframe'ów. Szukaj wejścia SHORT przy odbiciu do strefy ${price.toFixed(0)}-${r1.toFixed(0)}. Stop powyżej ${stopLoss.toFixed(0)}, cel ${takeProfit.toFixed(0)}.`;
    } else {
      setup = 'CZEKAJ';
      confidence = 'LOW';
      entryZone = '—';
      stopLoss = 0;
      takeProfit = 0;
      signal = `Mieszane sygnały — brak wyraźnego trendu. Trendy wzrostowe: ${bullishTrends}, spadkowe: ${bearishTrends}. Czekaj na potwierdzenie kierunku przed wejściem w pozycję.`;
    }

    const rrRatio = stopLoss && takeProfit ? `1:${Math.abs((takeProfit - price) / (price - stopLoss)).toFixed(1)}` : '—';
    const atr = parseFloat((range / 14).toFixed(2));

    return {
      price, change, changePct, high24h: high, low24h: low,
      trend4h, trend1h, trend15m, trend5m,
      resistance1: r1, resistance2: r2, support1: s1, support2: s2,
      setup, confidence, entryZone,
      stopLoss: stopLoss || null,
      takeProfit: takeProfit || null,
      signal, rrRatio, atr
    };
  }

  function getTrendClass(t) {
    if (t === 'UP') return 'bullish';
    if (t === 'DOWN') return 'bearish';
    return 'neutral';
  }

  function getTrendArrow(t) {
    if (t === 'UP') return '↑';
    if (t === 'DOWN') return '↓';
    return '→';
  }

  function getTrendDir(t) {
    if (t === 'UP') return 'up';
    if (t === 'DOWN') return 'down';
    return 'sideways';
  }

  function getSetupClass(s) {
    if (s === 'LONG') return 'long';
    if (s === 'SHORT') return 'short';
    return 'wait';
  }

  function getConfClass(c) {
    if (c === 'HIGH') return 'high';
    if (c === 'MEDIUM') return 'medium';
    return 'low';
  }

  function getRRWidth(rr) {
    const m = rr?.match(/1:([\d.]+)/);
    if (!m) return 30;
    return Math.min(100, (parseFloat(m[1]) / 4) * 100);
  }

  function fmt(n, dec=2) {
    if (!n && n !== 0) return '—';
    return n.toLocaleString('pl-PL', {minimumFractionDigits: dec, maximumFractionDigits: dec});
  }

  function renderDashboard(d) {
    const timeStr = new Date().toLocaleTimeString('pl-PL');
    const isUp = d.change >= 0;

    document.getElementById('app').innerHTML = `
      <div class="fade-in">
        <div class="price-section">
          <div>
            <div class="price-label">XAU/USD — ZŁOTO CFD</div>
            <div class="price-value">${fmt(d.price)}</div>
          </div>
          <div>
            <div class="price-change ${isUp ? 'up' : 'down'}">
              ${isUp ? '▲' : '▼'} ${fmt(Math.abs(d.change))} (${fmt(Math.abs(d.changePct))}%)
            </div>
          </div>
          <div class="update-info">
            Aktualizacja: ${timeStr}<br>
            Następna za: <span class="next-update" id="countdown">15:00</span>
          </div>
        </div>

        <div class="trend-grid">
          ${[['4H', d.trend4h], ['1H', d.trend1h], ['15M', d.trend15m], ['5M', d.trend5m]].map(([tf, trend]) => `
            <div class="trend-card ${getTrendClass(trend)}">
              <div class="tf-label">${tf}</div>
              <div class="tf-trend ${getTrendDir(trend)}">${trend}</div>
              <div class="tf-arrow">${getTrendArrow(trend)}</div>
            </div>
          `).join('')}
        </div>

        <div class="analysis-grid">
          <div class="analysis-card">
            <div class="card-title">OPORY</div>
            <div class="level-row"><span class="level-label">R2</span><span class="level-value resistance">${fmt(d.resistance2)}</span></div>
            <div class="level-row"><span class="level-label">R1</span><span class="level-value resistance">${fmt(d.resistance1)}</span></div>
            <div class="level-row"><span class="level-label">CENA</span><span class="level-value current">${fmt(d.price)}</span></div>
          </div>
          <div class="analysis-card">
            <div class="card-title">WSPARCIA</div>
            <div class="level-row"><span class="level-label">S1</span><span class="level-value support">${fmt(d.support1)}</span></div>
            <div class="level-row"><span class="level-label">S2</span><span class="level-value support">${fmt(d.support2)}</span></div>
            <div class="level-row"><span class="level-label">24H ZAKRES</span><span class="level-value" style="color:var(--blue);font-size:0.75rem">${fmt(d.low24h,0)} — ${fmt(d.high24h,0)}</span></div>
          </div>
        </div>

        <div class="setup-box ${getSetupClass(d.setup)}">
          <div class="setup-header">
            <div>
              <div style="font-size:0.65rem;color:var(--muted);letter-spacing:3px;margin-bottom:6px">SETUP WEJŚCIA</div>
              <div class="setup-type ${getSetupClass(d.setup)}">${d.setup}</div>
            </div>
            <div class="confidence-badge ${getConfClass(d.confidence)}">${d.confidence} CONFIDENCE</div>
          </div>
          <div class="setup-levels">
            <div class="setup-level"><div class="sl-label">STREFA WEJŚCIA</div><div class="sl-value entry">${d.entryZone}</div></div>
            <div class="setup-level"><div class="sl-label">STOP LOSS</div><div class="sl-value sl">${d.stopLoss ? fmt(d.stopLoss) : '—'}</div></div>
            <div class="setup-level"><div class="sl-label">TAKE PROFIT</div><div class="sl-value tp">${d.takeProfit ? fmt(d.takeProfit) : '—'}</div></div>
          </div>
          <div class="rr-bar">
            <div class="rr-label">R:R</div>
            <div class="rr-value">${d.rrRatio}</div>
            <div class="rr-bar-fill"><div class="rr-fill" style="width:${getRRWidth(d.rrRatio)}%"></div></div>
          </div>
          <div class="signal-desc">${d.signal}</div>
        </div>

        <div class="stats-row">
          <div class="stat-box"><div class="stat-label">ATR(14)</div><div class="stat-value">${fmt(d.atr)}</div></div>
          <div class="stat-box"><div class="stat-label">HIGH 24H</div><div class="stat-value" style="color:var(--red)">${fmt(d.high24h,0)}</div></div>
          <div class="stat-box"><div class="stat-label">LOW 24H</div><div class="stat-value" style="color:var(--green)">${fmt(d.low24h,0)}</div></div>
        </div>
      </div>
    `;
    startCountdown();
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    nextRefreshIn = 900;
    countdownTimer = setInterval(() => {
      nextRefreshIn--;
      const el = document.getElementById('countdown');
      if (el) {
        const m = Math.floor(nextRefreshIn / 60).toString().padStart(2,'0');
        const s = (nextRefreshIn % 60).toString().padStart(2,'0');
        el.textContent = `${m}:${s}`;
      }
      if (nextRefreshIn <= 0) { clearInterval(countdownTimer); runAnalysis(); }
    }, 1000);
  }

  async function runAnalysis() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '⟳ ANALIZUJĘ...';
    clearInterval(countdownTimer);

    document.getElementById('app').innerHTML = `
      <div class="loading"><div class="spinner"></div><div>POBIERANIE DANYCH RYNKOWYCH...</div></div>
    `;

    try {
      const data = await fetchGoldData();
      renderDashboard(data);
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="error-box">⚠ ${err.message}<br><br>Spróbuj odświeżyć za chwilę.</div>
      `;
    }

    btn.disabled = false;
    btn.textContent = '⟳ ODŚWIEŻ ANALIZĘ';
  }

  runAnalysis();
</script>

</body>
</html>
