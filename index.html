<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldAndPoker — Asystent Tradingu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
–gold: #FFD700;
–gold2: #FFA500;
–dark: #0a0a0f;
–dark2: #111118;
–dark3: #1a1a24;
–green: #00ff88;
–red: #ff3366;
–blue: #00aaff;
–text: #e0e0e0;
–muted: #666680;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–dark);
color: var(–text);
font-family: ‘Share Tech Mono’, monospace;
min-height: 100vh;
overflow-x: hidden;
}

/* Animated grid background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.container {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto;
padding: 16px;
}

/* Header */
.header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 20px;
padding-bottom: 16px;
border-bottom: 1px solid rgba(255,215,0,0.2);
}

.logo {
font-family: ‘Orbitron’, monospace;
font-size: 1.4rem;
font-weight: 900;
color: var(–gold);
text-shadow: 0 0 20px rgba(255,215,0,0.4);
letter-spacing: 2px;
}

.logo span { color: var(–text); }

.live-badge {
display: flex;
align-items: center;
gap: 8px;
background: rgba(255,51,102,0.15);
border: 1px solid rgba(255,51,102,0.4);
padding: 6px 14px;
border-radius: 4px;
font-size: 0.75rem;
color: var(–red);
letter-spacing: 2px;
}

.live-dot {
width: 8px; height: 8px;
background: var(–red);
border-radius: 50%;
animation: pulse 1.5s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.8); }
}

/* Price display */
.price-section {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.15);
border-radius: 8px;
padding: 20px;
margin-bottom: 16px;
display: flex;
align-items: center;
justify-content: space-between;
flex-wrap: wrap;
gap: 12px;
}

.price-label {
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 3px;
margin-bottom: 4px;
}

.price-value {
font-family: ‘Orbitron’, monospace;
font-size: 2.4rem;
font-weight: 700;
color: var(–gold);
text-shadow: 0 0 30px rgba(255,215,0,0.3);
letter-spacing: 2px;
}

.price-change {
font-size: 1rem;
font-weight: 700;
padding: 4px 12px;
border-radius: 4px;
}

.price-change.up { color: var(–green); background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); }
.price-change.down { color: var(–red); background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3); }

.update-info {
font-size: 0.7rem;
color: var(–muted);
text-align: right;
}

.next-update {
color: var(–gold);
font-size: 0.9rem;
}

/* Trend grid */
.trend-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 16px;
}

@media (max-width: 600px) {
.trend-grid { grid-template-columns: repeat(2, 1fr); }
.price-value { font-size: 1.8rem; }
}

.trend-card {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.1);
border-radius: 8px;
padding: 14px;
text-align: center;
transition: border-color 0.3s;
}

.trend-card.bullish { border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.05); }
.trend-card.bearish { border-color: rgba(255,51,102,0.4); background: rgba(255,51,102,0.05); }
.trend-card.neutral { border-color: rgba(255,165,0,0.4); background: rgba(255,165,0,0.05); }

.tf-label {
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 3px;
margin-bottom: 8px;
}

.tf-trend {
font-family: ‘Orbitron’, monospace;
font-size: 0.85rem;
font-weight: 700;
margin-bottom: 6px;
}

.tf-trend.up { color: var(–green); }
.tf-trend.down { color: var(–red); }
.tf-trend.sideways { color: var(–gold2); }

.tf-arrow {
font-size: 1.4rem;
}

/* Main analysis */
.analysis-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 16px;
}

@media (max-width: 600px) {
.analysis-grid { grid-template-columns: 1fr; }
}

.analysis-card {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.1);
border-radius: 8px;
padding: 16px;
}

.card-title {
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 3px;
margin-bottom: 12px;
padding-bottom: 8px;
border-bottom: 1px solid rgba(255,215,0,0.1);
}

.level-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 0;
border-bottom: 1px solid rgba(255,255,255,0.04);
font-size: 0.82rem;
}

.level-row:last-child { border-bottom: none; }

.level-label { color: var(–muted); font-size: 0.72rem; }
.level-value { font-family: ‘Orbitron’, monospace; font-size: 0.85rem; font-weight: 700; }
.level-value.resistance { color: var(–red); }
.level-value.support { color: var(–green); }
.level-value.current { color: var(–gold); }

/* Setup box */
.setup-box {
background: var(–dark2);
border-radius: 8px;
padding: 20px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}

.setup-box::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
}

.setup-box.long::before { background: linear-gradient(90deg, var(–green), transparent); border: 1px solid rgba(0,255,136,0.3); }
.setup-box.short::before { background: linear-gradient(90deg, var(–red), transparent); border: 1px solid rgba(255,51,102,0.3); }
.setup-box.wait::before { background: linear-gradient(90deg, var(–gold), transparent); border: 1px solid rgba(255,215,0,0.3); }

.setup-box.long { border: 1px solid rgba(0,255,136,0.25); }
.setup-box.short { border: 1px solid rgba(255,51,102,0.25); }
.setup-box.wait { border: 1px solid rgba(255,215,0,0.25); }

.setup-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
}

.setup-type {
font-family: ‘Orbitron’, monospace;
font-size: 1.6rem;
font-weight: 900;
letter-spacing: 3px;
}

.setup-type.long { color: var(–green); text-shadow: 0 0 20px rgba(0,255,136,0.4); }
.setup-type.short { color: var(–red); text-shadow: 0 0 20px rgba(255,51,102,0.4); }
.setup-type.wait { color: var(–gold); text-shadow: 0 0 20px rgba(255,215,0,0.4); }

.confidence-badge {
font-size: 0.7rem;
letter-spacing: 2px;
padding: 4px 10px;
border-radius: 4px;
}

.confidence-badge.high { background: rgba(0,255,136,0.15); color: var(–green); border: 1px solid rgba(0,255,136,0.3); }
.confidence-badge.medium { background: rgba(255,215,0,0.15); color: var(–gold); border: 1px solid rgba(255,215,0,0.3); }
.confidence-badge.low { background: rgba(255,51,102,0.15); color: var(–red); border: 1px solid rgba(255,51,102,0.3); }

.setup-levels {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}

.setup-level {
background: var(–dark3);
border-radius: 6px;
padding: 10px;
text-align: center;
}

.sl-label {
font-size: 0.6rem;
color: var(–muted);
letter-spacing: 2px;
margin-bottom: 6px;
}

.sl-value {
font-family: ‘Orbitron’, monospace;
font-size: 0.9rem;
font-weight: 700;
}

.sl-value.entry { color: var(–blue); }
.sl-value.sl { color: var(–red); }
.sl-value.tp { color: var(–green); }

/* Signal description */
.signal-desc {
background: var(–dark3);
border-radius: 6px;
padding: 12px;
margin-top: 12px;
font-size: 0.78rem;
color: var(–text);
line-height: 1.6;
border-left: 3px solid var(–gold);
}

/* RR ratio */
.rr-bar {
display: flex;
align-items: center;
gap: 10px;
margin-top: 12px;
}

.rr-label { font-size: 0.7rem; color: var(–muted); letter-spacing: 2px; }
.rr-value { font-family: ‘Orbitron’, monospace; font-size: 1rem; font-weight: 700; color: var(–gold); }
.rr-bar-fill {
flex: 1;
height: 4px;
background: var(–dark3);
border-radius: 2px;
overflow: hidden;
}
.rr-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold), var(–green));
border-radius: 2px;
transition: width 1s ease;
}

/* ATR */
.stats-row {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
margin-bottom: 16px;
}

.stat-box {
background: var(–dark2);
border: 1px solid rgba(255,215,0,0.1);
border-radius: 8px;
padding: 12px;
text-align: center;
}

.stat-label { font-size: 0.62rem; color: var(–muted); letter-spacing: 2px; margin-bottom: 6px; }
.stat-value { font-family: ‘Orbitron’, monospace; font-size: 1rem; font-weight: 700; color: var(–gold); }

/* Refresh button */
.refresh-btn {
width: 100%;
background: rgba(255,215,0,0.1);
border: 1px solid rgba(255,215,0,0.3);
color: var(–gold);
font-family: ‘Orbitron’, monospace;
font-size: 0.8rem;
letter-spacing: 3px;
padding: 14px;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s;
margin-bottom: 16px;
}

.refresh-btn:hover {
background: rgba(255,215,0,0.2);
box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

.refresh-btn:disabled {
opacity: 0.5;
cursor: not-allowed;
}

/* Loading */
.loading {
text-align: center;
padding: 40px;
color: var(–gold);
font-family: ‘Orbitron’, monospace;
font-size: 0.9rem;
letter-spacing: 3px;
}

.spinner {
display: inline-block;
width: 30px; height: 30px;
border: 3px solid rgba(255,215,0,0.2);
border-top-color: var(–gold);
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin-bottom: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer {
text-align: center;
font-size: 0.65rem;
color: var(–muted);
padding-top: 16px;
border-top: 1px solid rgba(255,215,0,0.1);
}

.footer span { color: var(–gold); }

/* Fade in animation */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

.fade-in { animation: fadeIn 0.4s ease forwards; }

.error-box {
background: rgba(255,51,102,0.1);
border: 1px solid rgba(255,51,102,0.3);
border-radius: 8px;
padding: 20px;
text-align: center;
color: var(–red);
font-size: 0.85rem;
margin-bottom: 16px;
}
</style>

</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">GOLD<span>&</span>POKER</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      ANALIZA LIVE
    </div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <div>ŁADOWANIE DANYCH...</div>
    </div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="runAnalysis()">
    ⟳ ODŚWIEŻ ANALIZĘ
  </button>

  <div class="footer">
    Auto-odświeżanie co <span>15 minut</span> • Dane: Yahoo Finance •
    <span>GoldAndPoker</span> by Tomasz • Nie jest to doradztwo finansowe
  </div>
</div>

<script>
  let nextRefreshIn = 900;
  let refreshTimer;
  let countdownTimer;

  async function fetchGoldPrice() {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{
          role: "user",
          content: `Search for the current gold price XAU/USD today and recent price movement. 
          Then respond with ONLY a JSON object (no markdown, no explanation) in this exact format:
          {
            "price": 3300.50,
            "change": -12.30,
            "changePercent": -0.37,
            "high24h": 3320.00,
            "low24h": 3280.00,
            "trend4h": "DOWN",
            "trend1h": "DOWN", 
            "trend15m": "SIDEWAYS",
            "trend5m": "UP",
            "resistance1": 3315.00,
            "resistance2": 3335.00,
            "support1": 3285.00,
            "support2": 3265.00,
            "setup": "SHORT",
            "entryZone": "3310-3315",
            "stopLoss": 3325.00,
            "takeProfit": 3280.00,
            "confidence": "HIGH",
            "atr": 8.5,
            "signal": "Brief explanation of the setup in Polish (2-3 sentences)",
            "rrRatio": "1:2.5"
          }
          Use real current price data from your search. Analyze the trend based on recent price action.`
        }]
      })
    });

    const data = await response.json();
    const fullText = data.content
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("");

    const clean = fullText.replace(/```json|```/g, "").trim();
    const jsonMatch = clean.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("Brak danych JSON");
    return JSON.parse(jsonMatch[0]);
  }

  function getTrendClass(trend) {
    if (trend === "UP" || trend === "STRONG UP") return "bullish";
    if (trend === "DOWN" || trend === "STRONG DOWN") return "bearish";
    return "neutral";
  }

  function getTrendArrow(trend) {
    if (trend === "UP" || trend === "STRONG UP") return "↑";
    if (trend === "DOWN" || trend === "STRONG DOWN") return "↓";
    return "→";
  }

  function getTrendDir(trend) {
    if (trend === "UP" || trend === "STRONG UP") return "up";
    if (trend === "DOWN" || trend === "STRONG DOWN") return "down";
    return "sideways";
  }

  function getSetupClass(setup) {
    if (setup === "LONG") return "long";
    if (setup === "SHORT") return "short";
    return "wait";
  }

  function getConfidenceClass(conf) {
    if (conf === "HIGH") return "high";
    if (conf === "MEDIUM") return "medium";
    return "low";
  }

  function getRRWidth(rr) {
    const match = rr?.match(/1:([\d.]+)/);
    if (!match) return 50;
    return Math.min(100, (parseFloat(match[1]) / 4) * 100);
  }

  function renderDashboard(d) {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const isUp = d.change >= 0;

    document.getElementById('app').innerHTML = `
      <div class="fade-in">
        <div class="price-section">
          <div>
            <div class="price-label">XAU/USD — ZŁOTO CFD</div>
            <div class="price-value">${d.price?.toLocaleString('pl-PL', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
          </div>
          <div>
            <div class="price-change ${isUp ? 'up' : 'down'}">
              ${isUp ? '▲' : '▼'} ${Math.abs(d.change)?.toFixed(2)} (${Math.abs(d.changePercent)?.toFixed(2)}%)
            </div>
          </div>
          <div class="update-info">
            Aktualizacja: ${timeStr}<br>
            Następna za: <span class="next-update" id="countdown">15:00</span>
          </div>
        </div>

        <div class="trend-grid">
          ${['4H','1H','15M','5M'].map((tf, i) => {
            const trendKey = ['trend4h','trend1h','trend15m','trend5m'][i];
            const trend = d[trendKey] || 'SIDEWAYS';
            return `
              <div class="trend-card ${getTrendClass(trend)}">
                <div class="tf-label">${tf}</div>
                <div class="tf-trend ${getTrendDir(trend)}">${trend}</div>
                <div class="tf-arrow">${getTrendArrow(trend)}</div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="analysis-grid">
          <div class="analysis-card">
            <div class="card-title">OPORY</div>
            <div class="level-row">
              <span class="level-label">R2</span>
              <span class="level-value resistance">${d.resistance2?.toLocaleString('pl-PL', {minimumFractionDigits: 2})}</span>
            </div>
            <div class="level-row">
              <span class="level-label">R1</span>
              <span class="level-value resistance">${d.resistance1?.toLocaleString('pl-PL', {minimumFractionDigits: 2})}</span>
            </div>
            <div class="level-row">
              <span class="level-label">CENA</span>
              <span class="level-value current">${d.price?.toLocaleString('pl-PL', {minimumFractionDigits: 2})}</span>
            </div>
          </div>

          <div class="analysis-card">
            <div class="card-title">WSPARCIA</div>
            <div class="level-row">
              <span class="level-label">S1</span>
              <span class="level-value support">${d.support1?.toLocaleString('pl-PL', {minimumFractionDigits: 2})}</span>
            </div>
            <div class="level-row">
              <span class="level-label">S2</span>
              <span class="level-value support">${d.support2?.toLocaleString('pl-PL', {minimumFractionDigits: 2})}</span>
            </div>
            <div class="level-row">
              <span class="level-label">24H ZAKRES</span>
              <span class="level-value" style="color:var(--blue);font-size:0.75rem">${d.low24h?.toFixed(0)} — ${d.high24h?.toFixed(0)}</span>
            </div>
          </div>
        </div>

        <div class="setup-box ${getSetupClass(d.setup)}">
          <div class="setup-header">
            <div>
              <div style="font-size:0.65rem;color:var(--muted);letter-spacing:3px;margin-bottom:6px">SETUP WEJŚCIA</div>
              <div class="setup-type ${getSetupClass(d.setup)}">${d.setup || 'CZEKAJ'}</div>
            </div>
            <div class="confidence-badge ${getConfidenceClass(d.confidence)}">
              ${d.confidence || 'MEDIUM'} CONFIDENCE
            </div>
          </div>

          <div class="setup-levels">
            <div class="setup-level">
              <div class="sl-label">STREFA WEJŚCIA</div>
              <div class="sl-value entry">${d.entryZone || '—'}</div>
            </div>
            <div class="setup-level">
              <div class="sl-label">STOP LOSS</div>
              <div class="sl-value sl">${d.stopLoss?.toLocaleString('pl-PL', {minimumFractionDigits: 2}) || '—'}</div>
            </div>
            <div class="setup-level">
              <div class="sl-label">TAKE PROFIT</div>
              <div class="sl-value tp">${d.takeProfit?.toLocaleString('pl-PL', {minimumFractionDigits: 2}) || '—'}</div>
            </div>
          </div>

          <div class="rr-bar">
            <div class="rr-label">R:R</div>
            <div class="rr-value">${d.rrRatio || '1:2'}</div>
            <div class="rr-bar-fill">
              <div class="rr-fill" style="width:${getRRWidth(d.rrRatio)}%"></div>
            </div>
          </div>

          <div class="signal-desc">${d.signal || 'Brak sygnału.'}</div>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-label">ATR(14)</div>
            <div class="stat-value">${d.atr?.toFixed(2) || '—'}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">HIGH 24H</div>
            <div class="stat-value" style="color:var(--red)">${d.high24h?.toFixed(2) || '—'}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">LOW 24H</div>
            <div class="stat-value" style="color:var(--green)">${d.low24h?.toFixed(2) || '—'}</div>
          </div>
        </div>
      </div>
    `;

    startCountdown();
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    nextRefreshIn = 900;
    countdownTimer = setInterval(() => {
      nextRefreshIn--;
      const el = document.getElementById('countdown');
      if (el) {
        const m = Math.floor(nextRefreshIn / 60).toString().padStart(2, '0');
        const s = (nextRefreshIn % 60).toString().padStart(2, '0');
        el.textContent = `${m}:${s}`;
      }
      if (nextRefreshIn <= 0) {
        clearInterval(countdownTimer);
        runAnalysis();
      }
    }, 1000);
  }

  async function runAnalysis() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '⟳ ANALIZUJĘ...';
    clearInterval(countdownTimer);
    clearInterval(refreshTimer);

    document.getElementById('app').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>POBIERANIE DANYCH RYNKOWYCH...</div>
      </div>
    `;

    try {
      const data = await fetchGoldPrice();
      renderDashboard(data);
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="error-box">
          ⚠ Błąd pobierania danych: ${err.message}<br><br>
          Sprawdź połączenie internetowe i spróbuj ponownie.
        </div>
      `;
    }

    btn.disabled = false;
    btn.textContent = '⟳ ODŚWIEŻ ANALIZĘ';
  }

  // Start on load
  runAnalysis();
</script>

</body>
</html>
